<!DOCTYPE html>
<html>

<head>

<title>LogiStock Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.servidor {
background:#ffffff;
border:2px solid #333;
padding:20px;
text-align:center;
border-radius:10px;
}

.bodega {
background:#ffffff;
border:2px solid #999;
padding:15px;
border-radius:10px;
}

.linea {
height:40px;
border-left:2px solid #444;
margin:auto;
}

</style>

</head>

<body class="bg-light">

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center">

<h1>LogiStock Admin</h1>

<a href="/" class="btn btn-outline-dark">Vista Pública</a>

</div>

<hr>

<h4 class="text-center mb-4">Arquitectura del Sistema</h4>

<div class="servidor shadow-sm">

<h5>Servidor Central</h5>

<p>Inventario Global</p>

<ul id="inventario-lista" class="list-group list-group-flush"></ul>

</div>

<div class="linea"></div>

<div class="row text-center mt-4">

<div class="col-md-4">

<div class="bodega shadow-sm">

<h6>Bodega Norte</h6>

<p>Nodo conectado</p>

</div>

</div>

<div class="col-md-4">

<div class="bodega shadow-sm">

<h6>Bodega Centro</h6>

<p>Nodo conectado</p>

</div>

</div>

<div class="col-md-4">

<div class="bodega shadow-sm">

<h6>Bodega Industrial</h6>

<p>Nodo conectado</p>

</div>

</div>

</div>

<hr class="mt-5">

<h4 class="text-center mb-3">Actividad del Sistema</h4>

<div class="card shadow-sm">

<div class="card-body">

<ul id="eventos-admin" class="list-group list-group-flush"></ul>

</div>

</div>

</div>

<script>

async function actualizarInventario() {

const response = await fetch("/inventario");

const data = await response.json();

const lista = document.getElementById("inventario-lista");

lista.innerHTML = "";

for (const producto in data) {

const item = document.createElement("li");

item.className = "list-group-item";

item.textContent = producto + " : " + data[producto];

lista.appendChild(item);

}

}

setInterval(actualizarInventario, 3000);
actualizarInventario();

</script>

<script>

let ultimoEvento = null;

async function actualizarEventos(){

const response = await fetch("/eventos");

const eventos = await response.json();

const lista = document.getElementById("eventos-admin");

lista.innerHTML = "";

eventos.forEach(evento => {

const item = document.createElement("li");

item.className = "list-group-item";

item.textContent = evento;

lista.appendChild(item);

});

if(eventos.length > 0 && eventos[0] !== ultimoEvento){

mostrarNotificacion(eventos[0]);

ultimoEvento = eventos[0];

}

}

setInterval(actualizarEventos,3000);
actualizarEventos();

</script>

<script>

function mostrarNotificacion(mensaje){

const container = document.getElementById("toast-container");

const toast = document.createElement("div");

toast.className = "toast align-items-center text-bg-dark border-0 show mb-2";

toast.innerHTML = `
<div class="d-flex">
<div class="toast-body">
${mensaje}
</div>
</div>
`;

container.appendChild(toast);

setTimeout(() => {
toast.remove();
}, 4000);

}

</script>

</body>

</html>
